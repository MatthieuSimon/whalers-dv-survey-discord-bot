name: CI / Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install UV
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run unit tests
        run: uv run python -m unittest discover tests

  build:
    name: Build Lambda deployment package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install UV
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync runtime dependencies
        run: uv sync --no-dev
      - name: Export requirements
        run: |
          uv export --no-dev --no-hashes -o requirements.txt
      - name: Prepare publish deployment package
        run: |
          mkdir -p package_publish
          pip install -r requirements.txt -t package_publish/ --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --python-version 314
          cp lambda_publish.py config.py db.py survey_payload.py package_publish/
      - name: Prepare interactions deployment package
        run: |
          mkdir -p package_interactions
          pip install -r requirements.txt -t package_interactions/ --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --python-version 314
          cp lambda_interactions.py config.py db.py survey_payload.py package_interactions/
      - name: Create deployment zips
        run: |
          cd package_publish
          zip -r ../publish-lambda-deployment.zip .
          cd ../package_interactions
          zip -r ../interactions-lambda-deployment.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-deployments
          path: |
            publish-lambda-deployment.zip
            interactions-lambda-deployment.zip

  deploy:
    name: Deploy to AWS Lambda
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-deployments
          path: .
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Deploy publish Lambda function
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_PUBLISH_FUNCTION_NAME }}" \
            --zip-file fileb://publish-lambda-deployment.zip
      - name: Deploy interactions Lambda function
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_INTERACTIONS_FUNCTION_NAME }}" \
            --zip-file fileb://interactions-lambda-deployment.zip
